body:
  text: 修辭鑑衡詩文評類提要臣等謹按修辭鑑衡二卷元王構編構字肯堂東平人官至翰林學士承旨諡文肅事迹具元史本傳據至順四年王理序是編乃構官濟南總管時以授其門人劉氏而理為刻於集慶路者舊本殘蠧闕其前頁其劉氏之名則不可考矣上卷論詩下卷論文皆採宋人詩話及文集説部為之構所附論者惟下卷結語一條而已所録雖多習見之語而去取頗為精核其中如詩文發源詩憲蒲氏漫齋録之類今皆亡佚不傳賴此書存其一二又世傳呂氏童蒙訓非其全帙此書所録凡三十一條皆今本所未載亦頗足以資考證較詩話總龜之類浩博而傷猥雜者實為勝之固談藝家之指南矣此書久無刻本傳寫多訛兩卷之中不注書名者凡十條又上卷佚其第五頁序文僅存末頁中亦時時有缺字今檢其可考者補之其無可考者則姑仍原本以存其舊焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀修辭鑑衡原序上闕以嵗貢山東廉訪司為其書吏居濟南故翰林承旨王文肅公為濟南總管固其鄉先生也君以諸生事之文肅教之為文出書一編即此書也劉君愛之不忘俾刻之理命李君晉仲李君伯羽校之釐正其次敘論詩為首文為後四六以附凡一百九十餘條俾學者知其難焉因命儒學正戚君子實掌板鄭楙刻之于集慶路學至順四年七月望日文林郎江南諸道行御史臺監察御史王理序
