body:
  text: 修辭鑑衡卷二元王構編文余近作示客云刺美風化緩而不迫謂之風采托事物摛華布體謂之賦推明政治正言得失謂之雅形容盛德揚厲休功謂之頌幽憂憤悱寓之比興謂之騷感觸事物託於文章謂之辭程事較功考實定名謂之銘援古刺今針戒得失謂之針紆徐抑揚永言謂之歌非鼓非鐘徒歌謂之謡步驟馳騁斐然成章謂之行品秩先後序而推之謂之引聲音雜比高下長短謂之曲吁嗟慨歌悲憂深思謂之吟吟詠情性合而言志謂之詩蘇李而上高簡古淡謂之古沈宋而下法律精切謂之律此詩之衆體也帝王之言出法度以制人者謂之制絲綸之語若日月之垂照者謂之詔制與詔同詔亦制也道其常而作彛憲者謂之典陳其謀而成嘉猷者謂之謨順其理而迪之者謂之訓屬其人而告之者謂之誥即師衆而申之者謂之誓因官使而命之者謂之命出於上者謂之教行之下者謂之令持而戒之者敕也言而諭之者宣也咨而揚之者贊也登而崇之者册也言其倫而析之者論也度其宜而揆之者議也别嫌疑而明之者辨也正是非而著之者説也記者記其事也紀者紀其實也書者纘而述焉者也䇿者條而對焉者也傳者傳而信者也序者緒而陳者也碑者披列事功而載之金石也碣者揭示操行而立之墓隧也誄者纍其素履而質之鬼神也志者識其行藏而謹其終始也檄者激發人心而諭之禍福也移者自近移遠使之周知也表者布人子之心致君父之前也箋者修儲后之問伸宮閫之儀也簡者質言之而略也啓者文言之而詳也狀者言之公上也牒者用之官府也捷書不緘插羽而傳之者露布也尺牘無封指事而陳之者劄子也青黃黼黻經緯以相成者總謂之文也此文之異名客有問古今體制之不一者勞於應答乃著之篇以示焉珊瑚鈎詩話古文有三等余以古文為三等周為上七國次之漢為下周之文雅七國之文壯偉其失騁漢之文華贍其失緩東漢而下無取焉後山詩話六經之文易曉夫文傳道而明心也古聖人不得已而為之而又欲句之難通義之難曉必不然矣請以六經明之詩三百篇皆儷其句皆叶其音可以播管絃薦宗廟闕熟也書者上古之書二帝三王之世之文也言古文者無出乎此則曰惠迪吉從逆凶又曰德日新萬邦惟懷志自滿九族乃離在禮儒行夫子之文也則曰衣冠中動作謹大遜如慢小遜如偽在樂記則曰鼓無當於五聲五聲不得不和水無當於五色五色不得不章春秋則全以屬辭比事為教不可備引焉在易則曰乾道成男坤道成女日月運行一寒一暑夫豈句之難通義之難曉耶今為文而舍六經又何法焉若第取其書所謂弔由靈易所謂朋合簪者摹其語而謂之古亦文之弊小畜文集論語之文論語文字簡淡不厭非左氏所可及呂居仁童蒙訓孟子之文百里奚自鬻於秦一章最見抑揚反覆處呂氏童蒙訓林文節公言以釜甑爨以鐡耕乎他人書此不知幾百言也黃端冕纓云輕暖不足於體亦不減此步里客談孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯蘇明允上歐公書毛詩之文張文潛云詩三百篇雖云婦人女子小夫賤𨽻所為要之非深於文章者不能作如七月在野至入我牀下於七月以下皆不道破直至十月方言蟋蟀非深於文章者能為之耶呂氏童蒙訓檀弓之文檀弓云南宮縚之妻之姑之喪三之字不能去其一進使者而問故夫子之所以問使者使者所以答夫子一進字足矣豐不餘一言約不失一辭呂氏童蒙訓檀弓與左氏紀太子申生事詳略不同讀左氏然後知檀弓之高遠也同上往年嘗請問於東坡先生作文法答云但熟讀檀弓當得之既而取讀數百遍然後知後世人作文不及古人之病山谷春秋之文為文必學春秋然後言語有法近世學者多以春秋為深隱不可學蓋不知春秋者也且聖人之言曷嘗務為奇險求後世之不可曉趙啖曰春秋明白如日月簡易如天地左氏之文文章不分明指切而從容委曲辭不迫切而意已獨至惟左傳為然當時諸國往來之辭與當時君臣相告相誚之語蓋可見矣亦是當時聖人餘澤未逺涵養自别故詞氣不迫如此非後世專學言語者也呂氏童蒙訓左氏之文語有盡而意無窮如獻子辭梗陽人一假所謂一唱三嘆有遺音者也如此等處皆是學文之本不可不深思也吕氏童蒙訓莊子左傳讀莊子令人意思寬大敢作讀左傳使人入法度不敢容易此二書不可偏廢近讀東坡魯直文亦類此呂氏童蒙訓列子列子氣平文緩非莊子步驟所能到呂氏童蒙訓孫子孫子十三篇論戰守次第與山川險易長短小大之狀皆曲盡其妙摧高發隱使物無遁情此尤文章妙處韓非子韓非諸書皆説盡事情呂氏童蒙訓史記史記其意深逺則其言愈緩其事繁碎則其言愈簡此特春秋之意李方叔文集兩漢之文漢高祖紀詔令雄健孝文紀詔令溫潤去先秦古書不逺後世不能及至孝武紀詔令始事文采文亦寖衰矣童蒙訓西漢自王褒以下文字專事詞藻不復簡古而谷永等書雜引經傳無復已見而古學逺矣此學者所宜深戒童蒙訓班固敘事詳密有次第專學左氏如敘霍氏上官相失之由正學左氏記秦穆晉惠相失處也童蒙訓張茂先稱左思三都賦使讀之者盡而有餘久而更新此最是作文字好處未知左思果能爾耶步里客談韓文公之文韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏掩蔽不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視蘇明允上歐公書柳子厚之文東坡在嶺外特喜子厚文朝夕不去手與陶淵明並稱二友及北歸與濟明書乃痛詆子厚時令斷刑四維貞符諸篇至以為小人無忌憚老學菴記徐敦立侍郎紹興末嘗為豫言柳子厚非國語之作正由平日法國語為文章看得熟故多見其疵病老學菴記歐陽公文文章紆餘委曲説盡事理惟歐陽公得之童蒙訓歐公之文紆餘委備往復百折而條達疏暢無所間斷氣盡語極急言竭論而容與間易無艱難勞苦之態蘇明允上歐公書歐公每為文既成必自竄易至有不留本初一字者其為文章則書而傅之屋壁出入觀省之至于尺牘單簡亦必立藁其精審如此每一篇出士大夫皆傳寫諷誦惟覩其渾然天成莫究斧鑿之痕也呂氏家孰記張子韶云歐公文粹如金玉東坡之文浩如河漢盛矣哉橫浦日新東坡之文老坡作文工於命意必超然獨立於衆人之上如趙清獻碑世間稱冶郡者曰寬立朝者曰直蓋已大矣欲進於二者又有説焉故曰其於治郡不專於寬時出猛政嚴而不殘其在朝廷不專於直為國愛人掩其疵病如吾家蜀公堅臥不起人知其高而不稱其用則為碑銘曰世皆謂公貴身賤名孰知其功侔聖人之清然後知其有功於世也又曰君實之用出而時施如彼水火寧除渴飢公雖不用亦相其行如彼山川出雲相望然後知其表裏廢一不可也此皆非世人所能到者平日得意到處多如此其源蓋出於莊子故其論劉伶莊子阮千里閻立本皆於世人意外别出眼目其平日取捨文章多以此為法潛溪詩眼王文公居鍾山有客自黃州來公曰東坡近日有何作對曰東坡宿臨臯亭醉夢中而起作寶相藏記千餘言才點定一兩字而已有墨本適留舟中公遣健步往取而至時月出東方林影在地公展讀於風簷喜見鬚眉曰子瞻人中龍也然有一字未穩客請願聞之公曰日勝日負不若日勝日貧耳東坡聞之撫掌大笑以公為知言冷齋夜話東坡晚年敘事文字多法柳子厚而豪邁之氣非柳所能及也童蒙訓曾子固文近世文字如曾子固諸序尤須詳味童蒙訓曾子固答李沿書最見抑揚反覆處童蒙訓曾子固文章紆餘委曲説盡事情加之字字有法度無遺恨矣童蒙訓秦少遊文文章有首有尾無一言亂説觀少遊五十䇿可見同前李格非論文李格非善論文章嘗曰諸葛孔明出師表劉伶酒德頌陶淵明歸去來辭李令伯乞養親表皆沛然如肺肝中流出殊不見斧鑿痕是數君子在後漢之末兩晉之間初未嘗欲以文章名世而其詞意超邁如此是知文章以氣為主氣以誠為主冷齋夜話文有三多陳後山云永叔謂為文有三多看多做多商量多也後山詩話東坡云頃歲孫莘老識文忠公乘間以文字問之云無他術惟勤讀書而多為之自工世人患作文字少又懶讀書每一篇出即求過人如此少有至者疵病不必待人指摘多作自能見之此公以其嘗試過告人故尤有味三蘇文為文當從三易沈隱侯曰古今為文當從三易易見事一也易見字二也易讀誦三也邢子才嘗曰沈侯文章用事不使人覺若胸臆語深以此服之杜工部作詩類多故實不似用事者是皆得作者之奧樊宗師為文澀不可讀亦自名家才不逮宗師者固不可效其體劉協文心雕龍論之至矣學文有自來東坡教人讀戰國䇿學説利害讀賈誼鼂錯趙充國疏學論事讀莊子論理性讀韓柳知作文體面李方叔文集議論文字須以董仲舒劉向為主禮記周禮及新序説苑之類皆當貫穿熟考山谷詞氣或不逮初造意時此病只是讀書未精博耳長袖善舞多錢善賈不虛語也山谷與王觀復書作文有悟入處作文必要悟入處悟入必自工夫中來非僥幸可得如老蘇之於文魯直之於詩盡此理矣童蒙訓林文節子中言讀孟子而悟文章法嘗云以釜甑爨以鐵耕乎他人書此不知當幾百言也步里客談餘見前老蘇嘗自言升裏轉斗裏量因聞此遂悟文章妙處童蒙訓東坡三馬贊振鬣長鳴萬馬皆瘖此皆記不傳之妙學文者能涵泳此等語自然有入處童蒙訓文章足以見人貴賤小説載盧擕貌陋常以文章謁韋宙韋氏子弟多肆輕侮宙語之曰盧雖人物不揚然觀其文章有首尾異日必貴後竟如其言本朝夏英公亦嘗以文章謁盛文肅公文肅公曰子文章有館閣氣象異日必顯後亦如其言皇朝類苑草野臺閣之文余嘗究之文章雖各出於心術而實有兩等有山林草野之文有朝廷臺閣之文山林草野之文其氣枯稿憔悴乃道不得行著書立言之所尚也朝廷臺閣之文其氣溫潤豐縟乃得行其道代言華國者之所尚也故本朝楊大年宋宣獻宋莒公胡武平所撰制詔皆婉美淳厚過於前世燕許常楊遠甚而其為人亦各類其文章王安國常語余曰文章格調須是官樣豈安國所言官樣亦謂有館閣氣耶今世樂藝亦有兩般格調若教坊格調則婉美風流外道格調則粗野嘲哳至於村歌社舞則又甚焉兹亦與文章相類皇朝類苑文章有三等文有三等上焉藏鋒不露讀之自有滋味中焉步驟馳騁飛沙走石下焉用意庸常專事造語麗澤文説文要先定凡例凡為文章皆須凡例先定如張安道作蘇明允墓表或曰蘇君或曰先生或曰明允言歐陽永叔或名或字凡例不先定致輕重不等步里客談為文先識主客凡為文須有主客先識主客然後成文字如今作文多是先立已意然後以巳説佐之此是不知主客也須是先立已意然後以故事佐吾説方可蒲氏漫齋語録為文不可蹈襲文章必自名家然後可傳不朽若體規畫圓凖方作矩終為人之臣僕古人譏屋下架屋信然陸機曰謝朝華於已披啓夕秀於未振韓愈曰惟陳言之務去此乃為文之要宋子京筆記文不可拘一體歐陽公云作文之體初欲奔馳久當撙節使簡重嚴正或時放肆以自舒勿為一體則盡善矣廬陵文集文要紆餘有首尾鼓氣以勢壯為美勢不可以不息不息則流宕而忘返亦猶絲竹繁奏必有希聲窈眇聽者恱聞如川流迅激必有洄洑逶迤觀者不厭麗澤文説過換處不可忽看文字須要看他過換及過接處麗澤文説文字用意為上文章貴曲折斡旋麗澤文説孟子中百里奚自鬻於秦一章與韓退之論思元賔而不見見元賔之所與者猶吾元賔也及曾子固答李沿書最見抑揚反覆處如此等類皆宜詳讀童蒙訓東坡在儋耳時葛延之自江陵擔簦萬里絶海往見留一月坡嘗誨以作文之法曰儋州雖百家聚州人所須取之市而足然不可徒得也必有一物以攝之然後為已用所謂一物者錢是也作文亦然天下之事散在經子史中不可徒使必得一物以攝之然後為巳用所謂一物者意是也不得錢不可以取物不得意不可以用事此文字之要也韻語陽秋文字不必多用事只用意便得麗澤文説古語云大匠不示人以朴蓋恐人見斧鑿痕迹也黃魯直於相國寺得宋子京唐史藁一册歸而熟讀之自是文章日健此無他見其竄易句字與初造意時不同而識其用意處曲洧舊聞山谷謂王立之若欲作楚詞追配古人直須熟讀楚詞觀古人用意曲折處講學之然後下筆譬如巧女文繡妙一世若欲作錦必得錦機乃成錦爾南昌文集文字一意貴在假數多麗澤文説人言歐公五代史其間議論多感歎又多設疑蓋感歎則動人設疑則意廣此作文之法也張橫浦日新東坡云意盡而言止者天下之至言也然而言止而意不盡尤為極至如禮記左傳可見童蒙訓文要説盡事情呂居仁云文章須要説盡事情如韓非諸書大略可見至一唱三嘆有遺音非有所養不能也童蒙訓文字要布置范元實云古人文章必謹布置如老杜贈韋見素詩云紈袴不餓死儒冠多誤身此一篇立意也故令靜聽而陳之自甫昔少年日至再使風俗淳皆儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身如此也則舉意而文備固已有是詩矣然必言所以見韋者於是有厚愧真知之句所以真知者謂傳誦其詩也然宰相職在進賢不當徒愛人而已士固不能無望故曰竊效貢公喜難甘原憲貧果無益則去之可也故曰焉能心怏怏止是走踆踆必入海而去秦也其於去也人情必有遲遲不忍之意故曰尚憐終南山回首清渭濵所知不可以不别故曰常擬報一飯况懷辭大臣夫如是則相忘江湖之外雖見素亦不可得而見矣故曰白鷗沒浩蕩萬里誰能馴終焉此詩前賢録為壓卷為其布置最得正體如官府甲第廳堂房室各有定處不亂也韓文公原道與書之堯典蓋如此其他雖謂之變體可也古今詩話文章平淡凡文字少小時須令氣象崢嶸采色絢爛漸老漸熟乃造平淡其實不是平淡乃絢爛之極也東坡集文不當好奇寧拙毋巧寧朴毋華寧粗毋弱寧僻毋俗詩文皆然後山詩話南朝劉協嘗論文章之難云意翻空而易奇文證實而難工此語亦是沈謝輩為儒林宗主時好作奇語故後生之論如此好作奇語自是文章一病但當以理得而辭順文章自然出羣拔萃觀杜子美到夔州後詩韓退之自潮州還後文章皆不煩繩削而自合矣文章蓋自建安以來好作奇語故其氣象衰苶其病至今猶在惟陳伯玉韓退之李習之近世歐陽永叔王介甫蘇子瞻秦少遊乃無此病耳山谷與王觀復書莊荀皆文士而有名者其説劍成相諸篇與屈騷何異揚子雲之文好奇而卒不能奇也故思苦而詞艱善為文者因事以出奇江河之行順下而已至觸山赴谷風搏物激然後盡天下之變子雲惟好奇故不能奇也後山詩話文要用人所不能用某少讀貨殖傳見所謂人棄我取人取我與遂悟為學法蓋為學能知人所不能知為文能用人所不能用斯為善矣節孝先生語作文他人所詳者我略他人所略者我詳若用言語必不得已只與點過麗澤文説起語上重下輕為文之病凡為文上句重下句輕則或為上句壓倒晝錦堂記云仕宦而至將相富貴而歸故鄉下云此人情之所榮而今昔之所同也非此兩句莫能承上句六一居士集序云言有大而非夸此雖只一句而體勢則甚重下乃云賢者信之衆人疑焉非用兩句亦載上句不起韓退之與人書泥水馬弱不敢出不果鞠躬親問而以書若無而以書三字則上重甚矣此為文之法也唐子西語録結語結文字須要精神不要間言語麗澤文説愚按韓文公獲麟解結云麟之所以為麟者以德不以形若麟之出不待聖人則謂之不祥也亦宜又送浮屠文暢師序結云余既重柳請又嘉浮屠能喜文詞於是乎言歐公縱囚論結是以堯舜三王之治必本於人情不立異以為高不逆情以干譽皆此法也下字倒用有力下字有倒用語格力勝者如吉日兮辰良必我也為漢患者步里客談春秋書曰吳子謁伐楚門于巢卒公羊傳曰入巢之門而卒也仲山甫城歸于謝詩則曰謝于城歸隱盜所得器左氏傳則曰盜所隱器此一例法也尚書厥篚玄纎縞纖字不在玄上又曰雲土夢作乂土字不在夢下亦例法也文則錯綜成文韓退之羅池廟碑銘有春與猿吟兮秋鶴與飛如楚詞吉日兮辰良蕙殽蒸兮蘭藉奠桂酒兮椒漿蓋欲相錯成文則語勢矯健耳沈存中筆談檢尋出處楊文公凡為文章所用故事常令子姪諸生檢討出處每假用小片紙録之既成則粘綴所録而蓄之時人謂之衲被呂氏家孰記文章日進宋子京云余每見所作文章憎之必欲燒棄堯臣喜曰公之文進矣廬陵文集繁簡文有以繁為貴者若檀弓石祁子沐浴佩玉莊子之大塊噫氣用者字韓子送孟東野用鳴字上宰相書至今稱周公之德其下又有不衰二字凡此類則以繁為貴也文有以簡為貴者若舜典至於南嶽如岱禮西嶽如初孟子獻子之友五人其三人則豫忘之史記事在某人傳凡此類則又以簡為貴也但繁而不厭其多簡而不遺其意乃為善也為文養氣韓退之答李翺老泉上歐陽公書最見為文養氣之妙童蒙訓作史劉元城與僕論作史之法先生曰新唐書敘事好簡略其辭故其事多鬱而不明此作史之弊也且文章豈有繁簡也意必欲其多則冗長而不足讀必欲其簡則僻澀令人不喜讀假令新唐書載卓文君事不過止曰少嘗竊卓氏以逃如此而巳班固載此事乃近五百字讀之不覺有繁也且文君之事亦何補於天下後世哉然作史之法不得不如是故可謂之文如風行水上出於自然也若不出於自然而有意於繁簡則失之矣唐書進表云其事則增於前其文則省於舊且新唐書所以不及兩漢文章者其病正在此兩句也又反以為工何哉然新舊唐史各有長短未易優劣也元城先生語録四六四六之工在於剪裁若全句對全句亦何以見工四六以經語對經語史語對史語詩語對詩語方妥帖四六談塵太祖郊祀陶穀作赦文不以籩豆有楚對黍稷非馨而曰豆籩陳有楚之儀黍稷奉惟馨之薦近世王初寮在翰苑作寶籙宮青詞云上天之載無聲下民之虐匪降時人許其裁剪同上靖康間劉觀中逺作百官賀徽廟還京表云漢殿上皇本是野田之叟唐朝肅帝又非揖遜之君何栗文縝時為中書侍郎索筆塗之用此二事别作一聫云擁篲郤行陋未央之過禮執鞚前引笑靈武之曲恭文縝以四六知名其謝召還表云兩曾參之是非浮言猶在一王尊之賢佞更世乃明同上夏英公父官於河北景德中契丹犯河北遂沒于陳後公為舍人丁母憂起復奉使契丹公辭不行其表云父沒王事身丁母憂義不戴天難下穹廬之拜禮當枕塊忍聞禁韎之音當時以為四六對偶最精絶者歸田録修辭鑑衡卷二
